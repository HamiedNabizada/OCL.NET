name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ANTLR code generation (Antlr4BuildTasks) runs at build time and needs a JRE.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - run: dotnet restore OCL.NET.sln
      - run: dotnet build OCL.NET.sln -c Release --no-restore
      - run: dotnet test OCL.NET.sln -c Release --no-build --nologo
