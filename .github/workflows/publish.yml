name: Publish

# Pushes OCL.NET.Core and OCL.NET.Caex to NuGet when a version tag (e.g. v0.1.0) is pushed.
# Requires a repository secret NUGET_API_KEY with push rights on nuget.org.
on:
  push:
    tags: [ 'v*' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - run: dotnet test OCL.NET.sln -c Release --nologo
      - run: dotnet pack OCL.NET.sln -c Release -o artifacts --nologo
      - run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
